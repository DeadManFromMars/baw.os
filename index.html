<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAWSOME INC.</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f5f2ec; --white: #fdfcfa; --red: #e8372a;
  --red2: rgba(232,55,42,0.1); --ink: #1a1a18; --ink2: #3a3a35;
  --muted: #8a8a80; --muted2: #c8c8c0; --sage: #7a9a8a;
  --border: rgba(26,26,24,0.08); --border2: rgba(26,26,24,0.14);
  --green: #00c853;
}
html, body { height: 100%; width: 100%; background: var(--cream); color: var(--ink); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
.haze { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(ellipse at 15% 8%, rgba(255,255,255,0.75) 0%, transparent 45%), radial-gradient(ellipse at 85% 88%, rgba(255,248,235,0.55) 0%, transparent 40%); animation: hazeDrift 14s ease-in-out infinite alternate; }
@keyframes hazeDrift { from { opacity: 0.85; transform: scale(1); } to { opacity: 1; transform: scale(1.05) translate(-6px,-3px); } }
#dotCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.13; }
.geo-top { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: var(--red); z-index: 5; }
.geo-left { position: fixed; top: 0; left: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, var(--red) 0%, transparent 25%); z-index: 5; }
.geo-corner { position: fixed; top: 3px; left: 3px; width: 80px; height: 80px; border-right: 1px solid rgba(232,55,42,0.15); border-bottom: 1px solid rgba(232,55,42,0.15); z-index: 5; pointer-events: none; }

/* ── TERMINAL BAR ── */
#termBar {
  position: fixed; bottom: -110px; left: 0; right: 0; height: 96px;
  background: #080808; z-index: 50;
  display: flex; align-items: center;
  padding: 0 28px; gap: 0;
  border-top: 1px solid #1a3a1a;
  transition: bottom 0.7s cubic-bezier(0.16,1,0.3,1);
  font-family: 'Space Mono', monospace;
}
#termBar.visible { bottom: 0; }
.term-prompt { color: #2a6a2a; font-size: 0.82rem; letter-spacing: 0.05em; margin-right: 10px; flex-shrink: 0; }
.term-line { color: #00cc44; font-size: 0.82rem; letter-spacing: 0.04em; flex: 1; }
.term-cursor { display: inline-block; width: 7px; height: 0.9em; background: #00cc44; vertical-align: text-bottom; animation: termBlink 0.8s step-end infinite; margin-left: 2px; }
@keyframes termBlink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── SCAN PHASE ── */
#scanPhase {
  position: fixed; inset: 0; z-index: 10;
  display: grid; grid-template-columns: 1fr 1fr;
  transition: filter 3.5s ease, opacity 3s ease;
}
#scanPhase.dissolving { filter: blur(32px) brightness(2) saturate(0.1); opacity: 0; }
#scanPhase.vhs::after {
  content: '';
  position: absolute; inset: 0; z-index: 100; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  animation: vhsScan 0.12s linear infinite;
}
@keyframes vhsScan { from { background-position: 0 0; } to { background-position: 0 8px; } }
#scanPhase.vhs { animation: vhsShake 0.18s ease-in-out infinite; }
@keyframes vhsShake {
  0%,100% { transform: translate(0,0); filter: none; }
  15% { transform: translate(-3px, 1px); filter: hue-rotate(8deg); }
  30% { transform: translate(3px, -2px); filter: hue-rotate(-8deg); }
  45% { transform: translate(-2px, 3px); filter: none; }
  60% { transform: translate(4px, -1px); filter: hue-rotate(5deg); }
  75% { transform: translate(-1px, 2px); filter: none; }
  90% { transform: translate(2px, -3px); filter: hue-rotate(-5deg); }
}
#scanPhase.vhs .geo-top, #scanPhase.vhs .geo-left { opacity: 0.3; }
#scanPhase.reversing-phase { animation: none; }

/* VHS edge glow */
.vhs-overlay {
  position: fixed; inset: 0; z-index: 99; pointer-events: none;
  opacity: 0; transition: opacity 0.4s ease;
  background: rgba(0,0,0,0.55);
  box-shadow: inset 0 0 120px rgba(255,0,60,0.2), inset 0 0 40px rgba(0,200,255,0.1);
}
.vhs-overlay.active { opacity: 1; }
.vhs-overlay.active::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px
  );
  pointer-events: none;
}

/* LEFT */
.scan-left {
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0 5vw 0 12vw; border-right: 1px solid var(--border);
  overflow: hidden; position: relative;
}
.scan-left::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100px; background: linear-gradient(180deg, var(--cream) 20%, transparent 100%); z-index: 2; pointer-events: none; }
.scan-left::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(0deg, var(--cream) 20%, transparent 100%); z-index: 2; pointer-events: none; }
.scan-header { position: absolute; top: 50%; left: 12vw; right: 5vw; transform: translateY(-50%); z-index: 3; pointer-events: none; }
.scan-wordmark { font-weight: 700; font-size: clamp(2.4rem, 5.5vw, 4.8rem); letter-spacing: -0.03em; color: var(--ink); line-height: 1; margin-bottom: 4px; opacity: 0; animation: riseIn 1s 0.2s ease forwards; display: inline-block; }
.scan-wordmark .red-dot { display: inline-block; width: 0.14em; height: 0.14em; border-radius: 50%; background: var(--red); margin-left: 0.05em; vertical-align: middle; margin-bottom: 0.04em; animation: dotPulse 2s ease-in-out infinite; }
@keyframes dotPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.4; } }
.scan-tagline { font-size: clamp(0.48rem, 0.9vw, 0.6rem); font-weight: 400; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; opacity: 0; animation: riseIn 0.8s 0.6s ease forwards; }
.scan-lines-wrap { width: 100%; height: 45vh; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 0 60px; transition: transform 0s; }
.scan-lines { display: flex; flex-direction: column; gap: clamp(4px, 0.9vh, 10px); opacity: 0; animation: riseIn 0.6s 1s ease forwards; }
.scan-line { display: flex; align-items: baseline; gap: clamp(8px, 1.4vw, 16px); opacity: 0; transform: translateY(6px); transition: opacity 0.3s ease, transform 0.3s ease; flex-shrink: 0; }
.scan-line.active { opacity: 1; transform: translateY(0); }
.scan-line.s0 .scan-line-val { font-size: clamp(0.85rem, 1.7vw, 1.25rem); }
.scan-line.s1 .scan-line-val { font-size: clamp(0.72rem, 1.4vw, 1rem); }
.scan-line.s2 .scan-line-val { font-size: clamp(0.6rem, 1.1vw, 0.82rem); opacity: 0.75; }
.scan-line.s3 .scan-line-val { font-size: clamp(0.5rem, 0.85vw, 0.65rem); opacity: 0.55; }
.scan-line.s4 .scan-line-val { font-size: clamp(0.4rem, 0.65vw, 0.5rem); opacity: 0.38; }
.scan-line.s5 .scan-line-val { font-size: clamp(0.32rem, 0.5vw, 0.4rem); opacity: 0.22; }
.scan-line-key { font-size: clamp(0.35rem, 0.65vw, 0.52rem); letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; font-weight: 500; flex-shrink: 0; min-width: clamp(55px, 9vw, 110px); }
.scan-line.s3 .scan-line-key, .scan-line.s4 .scan-line-key, .scan-line.s5 .scan-line-key { opacity: 0.4; }
.scan-line-val { font-family: 'Space Mono', monospace; color: var(--ink); font-weight: 400; letter-spacing: -0.01em; line-height: 1.2; word-break: break-all; }
.scan-line-val.pending { color: var(--muted2); }
.ellipsis { display: inline-flex; gap: 3px; align-items: center; }
.ellipsis span { display: inline-block; width: 3px; height: 3px; border-radius: 50%; background: var(--muted2); }
.ellipsis span:nth-child(1) { animation: ellipsisHop 0.9s 0s ease-in-out infinite; }
.ellipsis span:nth-child(2) { animation: ellipsisHop 0.9s 0.15s ease-in-out infinite; }
.ellipsis span:nth-child(3) { animation: ellipsisHop 0.9s 0.3s ease-in-out infinite; }
@keyframes ellipsisHop { 0%,60%,100% { transform: translateY(0); background: var(--muted2); } 30% { transform: translateY(-3px); background: var(--muted); } }
.scan-line-check { font-size: clamp(0.5rem, 0.9vw, 0.75rem); color: var(--red); font-weight: 700; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; margin-left: 3px; }
.scan-line.done .scan-line-check { opacity: 1; }

/* highlighted bad line */
.scan-line.orphaned .scan-line-val { color: var(--red) !important; background: rgba(232,55,42,0.1); padding: 3px 8px; border-left: 3px solid var(--red); font-size: 1.1rem !important; }
.scan-line.orphaned .scan-line-key { color: var(--red) !important; font-size: 0.6rem !important; opacity: 1 !important; }
.scan-line.resolved .scan-line-val { color: var(--green) !important; background: rgba(0,200,83,0.1); padding: 3px 8px; border-left: 3px solid var(--green); font-size: 1.1rem !important; transition: color 0.4s ease, background 0.4s ease, border-color 0.4s ease; }
.scan-line.resolved .scan-line-key { color: var(--green) !important; font-size: 0.6rem !important; opacity: 1 !important; }

/* progress */
.scan-progress { position: absolute; bottom: 20px; left: 12vw; right: 5vw; z-index: 3; opacity: 0; animation: riseIn 0.6s 1.2s ease forwards; }
.progress-track { height: 1px; background: var(--muted2); margin-bottom: 7px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: var(--red); transition: width 0.25s ease; }
.progress-meta { display: flex; justify-content: space-between; font-size: 0.42rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
.progress-meta span { color: var(--red); }
.progress-fill.green { background: var(--green); transition: background 0.6s ease; }

/* RIGHT */
.scan-right { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 10vw 0 8vw; position: relative; }

/* floating text box drawn by hand */
#drawnBox {
  position: fixed;
  border: 2.5px solid var(--ink);
  background: rgba(253,252,250,0.95);
  opacity: 0;
  pointer-events: none;
  overflow: hidden;
  transition: opacity 0.3s ease;
  z-index: 50;
}
#drawnBox.visible { opacity: 1; }
.drawn-box-inner {
  padding: 24px 28px;
  display: flex; flex-direction: column;
  gap: 4px;
}

.tw-text, .tw-text2, .tw-text3 {
  font-family: 'Space Mono', monospace;
  font-size: clamp(1.05rem, 1.9vw, 1.6rem);
  color: #1a1a18;
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.02em;
  line-height: 1.6;
  min-height: 1.7em;
  display: block;
}

.cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--ink); margin-left: 2px;
  vertical-align: text-bottom;
  animation: cursorBlink 0.65s step-end infinite;
}
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

/* second mouse cursor */
#anonCursor {
  position: fixed; width: 20px; height: 28px;
  z-index: 200; pointer-events: none; opacity: 0;
  transition: opacity 0.4s ease;
}
#anonCursor.visible { opacity: 0.85; }

/* hand image */
#handImg {
  position: fixed; width: 160px; height: 160px;
  z-index: 201; pointer-events: none; opacity: 0;
  mix-blend-mode: multiply;
  transition: opacity 0.5s ease;
}
#handImgFlipped {
  position: fixed; width: 160px; height: 160px;
  z-index: 201; pointer-events: none; opacity: 0;
  mix-blend-mode: multiply;
  transform: scaleX(-1);
  transition: opacity 0.5s ease;
}

/* ── PHASE 2: LOGIN ── */
#loginPhase { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
#loginPhase.visible { opacity: 1; pointer-events: all; }
.login-card { position: relative; width: min(400px, 90vw); background: rgba(253,252,250,0.88); backdrop-filter: blur(30px) saturate(1.1); -webkit-backdrop-filter: blur(30px) saturate(1.1); border: 1px solid var(--border2); border-radius: 2px; padding: 44px 40px 40px; box-shadow: 0 2px 4px rgba(26,26,24,0.04), 0 24px 64px rgba(26,26,24,0.09); animation: cardFloat 9s ease-in-out infinite; }
@keyframes cardFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 40% { transform: translateY(-5px) rotate(0.15deg); } 70% { transform: translateY(-3px) rotate(-0.1deg); } }
.login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--red); border-radius: 2px 2px 0 0; }
.card-eyebrow { font-size: 0.5rem; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.card-eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--red); flex-shrink: 0; }
.card-heading { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.03em; color: var(--ink); line-height: 0.95; margin-bottom: 8px; }
.card-heading em { font-style: normal; color: var(--red); }
.card-sub { font-size: 0.72rem; font-weight: 300; color: var(--muted); line-height: 1.6; margin-bottom: 26px; }
.card-divider { height: 1px; background: var(--border); margin-bottom: 22px; position: relative; }
.card-divider::after { content: ''; position: absolute; left: 0; top: 0; width: 24px; height: 1px; background: var(--red); }
.field { margin-bottom: 14px; }
.field-label { font-size: 0.5rem; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; font-weight: 500; margin-bottom: 6px; display: block; transition: color 0.2s; }
.field:focus-within .field-label { color: var(--red); }
.field input { width: 100%; background: rgba(255,255,255,0.7); border: 1px solid var(--border2); border-radius: 2px; color: var(--ink); font-family: 'Space Mono', monospace; font-size: 0.82rem; padding: 11px 14px; outline: none; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; }
.field input:focus { border-color: var(--red); background: var(--white); box-shadow: 0 0 0 3px var(--red2); }
.field input::placeholder { color: var(--muted2); font-family: 'Space Grotesk', sans-serif; font-size: 0.78rem; font-weight: 300; }
.btn { width: 100%; margin-top: 8px; background: var(--ink); border: none; border-radius: 2px; color: var(--cream); font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 13px; cursor: pointer; position: relative; overflow: hidden; transition: background 0.2s, transform 0.1s; }
.btn::after { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px; background: var(--red); transition: width 0.25s ease; }
.btn:hover { background: var(--ink2); }
.btn:hover::after { width: 5px; }
.btn:active { transform: scale(0.99); }
.msg { margin-top: 10px; font-size: 0.6rem; letter-spacing: 0.08em; min-height: 1rem; opacity: 0; transition: opacity 0.3s; font-weight: 500; }
.msg.show { opacity: 1; }
.msg.error { color: var(--red); }
.msg.success { color: var(--sage); }
.progress-wrap { margin-top: 8px; height: 1px; background: var(--border); overflow: hidden; opacity: 0; transition: opacity 0.3s; }
.progress-wrap.show { opacity: 1; }
.progress-bar { height: 100%; width: 0%; background: var(--red); transition: width 1.5s ease; }
.card-footer { margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 0.46rem; letter-spacing: 0.15em; color: var(--muted2); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
.card-footer .monitor { display: flex; align-items: center; gap: 6px; }
.card-footer .monitor::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: dotPulse 1.5s infinite; }

/* overlay */
#overlay { position: fixed; inset: 0; background: var(--cream); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; }
#overlay.show { opacity: 1; pointer-events: all; }
.ov-title { font-weight: 700; font-size: 3.5rem; letter-spacing: -0.03em; color: var(--ink); }
.ov-title span { color: var(--red); }
.ov-sub { font-size: 0.58rem; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; }
.ov-bar { width: 200px; height: 1px; background: var(--border); overflow: hidden; }
.ov-fill { height: 100%; width: 0%; background: var(--red); transition: width 2.2s ease; }

@keyframes riseIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<canvas id="dotCanvas"></canvas>
<div class="haze"></div>
<div class="vhs-overlay" id="vhsOverlay"></div>
<div class="geo-top"></div>
<div class="geo-left"></div>
<div class="geo-corner"></div>

<!-- terminal bar -->
<div id="termBar">
  <span class="term-prompt">root@bsi-node-7 ~$</span>
  <span class="term-line" id="termLine"><span class="term-cursor"></span></span>
</div>

<!-- hand images -->
<img id="handImg" src="./hand.png" alt="" />
<img id="handImgFlipped" src="./hand.png" alt="" />

<!-- anon cursor SVG -->
<svg id="anonCursor" viewBox="0 0 20 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0 0 L0 20 L5 15 L8 24 L11 23 L8 14 L14 14 Z" fill="#1a1a18"/>
</svg>

<!-- scan phase -->
<div id="scanPhase">
  <div class="scan-left">
    <div class="scan-header">
      <div class="scan-wordmark">BAWSOME INC<span class="red-dot"></span></div>
      <div class="scan-tagline">Initializing Secure Session</div>
    </div>
    <div class="scan-lines-wrap" id="scanLinesWrap">
      <div class="scan-lines" id="scanLines"></div>
    </div>
    <div class="scan-progress">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-meta">
        <span id="progressLabel">Collecting data</span>
        <span id="progressPct">0%</span>
      </div>
    </div>
  </div>

  <div class="scan-right" id="scanRight">
    <div id="drawnBox">
      <div class="drawn-box-inner">
        <div class="tw-text" id="twText1"></div>
        <div class="tw-text2" id="twText2"></div>
        <div class="tw-text3" id="twText3"></div>
      </div>
    </div>
  </div>
</div>

<!-- login -->
<div id="loginPhase">
  <div class="login-card" id="loginCard">
    <div class="card-eyebrow">Employee Portal</div>
    <div class="card-heading">Secure<br><em>Sign-In.</em></div>
    <div class="card-sub">Authorized personnel only. All sessions are recorded and monitored.</div>
    <div class="card-divider"></div>
    <div class="field">
      <label class="field-label">Employee ID</label>
      <input type="text" id="username" placeholder="your designation" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field">
      <label class="field-label">Passphrase</label>
      <input type="password" id="password" placeholder="enter passphrase" autocomplete="off" />
    </div>
    <button class="btn" onclick="attemptLogin()">Sign In</button>
    <div class="msg" id="msg"></div>
    <div class="progress-wrap" id="loginProgress"><div class="progress-bar" id="loginBar"></div></div>
    <div class="card-footer">
      <div class="monitor">Session Active</div>
      <span id="sessionId">BSI-——</span>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="ov-title">Access <span>Granted.</span></div>
  <div class="ov-sub">Loading classified archive</div>
  <div class="ov-bar"><div class="ov-fill" id="ovFill"></div></div>
</div>

<script>
const ACCESS_CODE = 'bawsome';
const REDIRECT_URL = 'stage2.html';

// ── DOT CANVAS ──
const canvas = document.getElementById('dotCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);
const dots = Array.from({length:65}, ()=>({ x:Math.random(), y:Math.random(), r:Math.random()*1.3+0.3, vx:(Math.random()-0.5)*0.00007, vy:(Math.random()-0.5)*0.00007, d:Math.random() }));
let mx=0.5,my=0.5,tmx=0.5,tmy=0.5;
document.addEventListener('mousemove', e=>{ tmx=e.clientX/W; tmy=e.clientY/H; });
function drawDots() {
  mx+=(tmx-mx)*0.04; my+=(tmy-my)*0.04;
  ctx.clearRect(0,0,W,H);
  dots.forEach(d=>{ d.x=(d.x+d.vx+1)%1; d.y=(d.y+d.vy+1)%1;
    const px=(d.x+(mx-0.5)*0.05*d.d)%1, py=(d.y+(my-0.5)*0.04*d.d)%1;
    ctx.beginPath(); ctx.arc(px*W,py*H,d.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(26,26,24,${0.2+d.d*0.3})`; ctx.fill();
  });
  requestAnimationFrame(drawDots);
}
drawDots();
document.addEventListener('mousemove', e=>{
  const dx=e.clientX/W-0.5, dy=e.clientY/H-0.5;
  const card=document.getElementById('loginCard');
  if(card && document.getElementById('loginPhase').classList.contains('visible'))
    card.style.transform=`perspective(900px) rotateX(${-dy*3}deg) rotateY(${dx*3}deg)`;
});

// ── DATA ──
const dataReady = {};
function setData(id,val){ dataReady[id]=val; }
fetch('https://api.ipify.org?format=json')
  .then(r=>r.json()).then(d=>{ setData('ip',d.ip); return fetch(`https://ipapi.co/${d.ip}/json/`); })
  .then(r=>r.json()).then(d=>{
    setData('loc',[d.city,d.country_name].filter(Boolean).join(', ')||'Unknown');

function revealNextRow() {
  try {
  if(dissolveTriggered||scanPaused) return;
  let def, isExtra=false;
  if(rowIndex < scanDefs.length) { def = scanDefs[rowIndex]; }
  else { isExtra=true; const key=extraKeys[(rowIndex-scanDefs.length)%extraKeys.length]; def={key,id:null,s:5,wait:6,pause:2}; }
  rowIndex++;
  const line=document.createElement('div');
  line.className=`scan-line s${def.s}`;
  const keyEl=document.createElement('div'); keyEl.className='scan-line-key'; keyEl.textContent=def.key;
  const valEl=document.createElement('div'); valEl.className='scan-line-val pending'; valEl.id='sv_'+def.id+'_'+rowIndex;
  if(!isExtra) valEl.appendChild(makeEllipsis()); else valEl.textContent='...';
  const checkEl=document.createElement('div'); checkEl.className='scan-line-check'; checkEl.textContent='✕';
  line.appendChild(keyEl); line.appendChild(valEl); line.appendChild(checkEl);
  scanContainer.appendChild(line);
  while(scanContainer.children.length > MAX_VISIBLE) scanContainer.removeChild(scanContainer.firstChild);
  requestAnimationFrame(()=>requestAnimationFrame(()=>line.classList.add('active')));
  const startTime=Date.now();
  const hardMax=Math.max(def.wait, 4000);
  function tryPopulate() {
    if(dissolveTriggered||scanPaused) return;
    const val=isExtra?fakeVal():dataReady[def.id];
    const elapsed=Date.now()-startTime;
    const ready=(val!==undefined&&elapsed>=def.wait)||(elapsed>=hardMax);
    if(isExtra||ready) {
      const displayVal=isExtra?fakeVal():(val!==undefined?val:'—');
      line.classList.add('done');
      valEl.innerHTML=''; valEl.textContent=displayVal; valEl.classList.remove('pending');
      if(def.id==='route_depth') { line.classList.add('orphaned'); orphanedLineEl=line; }
      if(!isExtra) { completedRows++; updateProgress(completedRows); if(!typewriterTriggered&&completedRows>=Math.floor(totalDefinedRows*0.5)){ typewriterTriggered=true; setTimeout(startConductorSequence,2300); } }
      setTimeout(revealNextRow,def.pause);
    } else { setTimeout(tryPopulate,40); }
  }
  setTimeout(tryPopulate,Math.min(def.wait,400));
  } catch(e) { console.error('revealNextRow error:',e); }
}

// ── ANIMATION HELPERS ──
function animXY(el, fromX, fromY, toX, toY, dur, ease, cb) {
  const s=performance.now();
  function f(now) {
    let t=Math.min((now-s)/dur,1);
    if(ease==='out') t=1-Math.pow(1-t,3);
    if(ease==='inout') t=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    el.style.left=(fromX+(toX-fromX)*t)+'px';
    el.style.top=(fromY+(toY-fromY)*t)+'px';
    if(t<1) requestAnimationFrame(f);
    else { el.style.left=toX+'px'; el.style.top=toY+'px'; if(cb)cb(); }
  }
  requestAnimationFrame(f);
}

function typeBeforeCursor(cursor, text, speed, onDone) {
  let i=0;
  const iv=setInterval(()=>{
    if(i<text.length){ cursor.insertAdjacentText('beforebegin',text[i]); i++; }
    else { clearInterval(iv); if(onDone)setTimeout(onDone,0); }
  },speed);
}

// Prepends rows at the TOP of the existing scanLines container

function doReverse(onDone) {
  const container = document.getElementById('scanLines');
  const wrap = document.getElementById('scanLinesWrap');

  // Switch wrap to overflow visible, top-aligned, so prepended rows appear from top
  wrap.style.justifyContent = 'flex-start';
  wrap.style.overflow = 'visible';
  wrap.style.height = 'auto';
  wrap.style.minHeight = '100vh';
  wrap.style.padding = '0';
  container.style.gap = '3px';

  // Rewind data — real keys in reverse order
  const rewindData = [
    ['ASN', dataReady['asn']||'—'],
    ['User Agent', (dataReady['ua']||'—').slice(0,40)+'...'],
    ['Timestamp', dataReady['time']||'—'],
    ['Network', dataReady['online']||'—'],
    ['History', dataReady['history_len']||'—'],
    ['Viewport', dataReady['viewport']||'—'],
    ['Referrer', dataReady['ref']||'—'],
    ['Plugins', dataReady['plugins']||'—'],
    ['Cookies', dataReady['cookies']||'—'],
    ['Storage', dataReady['storage']||'—'],
    ['WebGL', dataReady['webgl']||'—'],
    ['Orientation', dataReady['orient']||'—'],
    ['RTT Latency', dataReady['rtt']||'—'],
    ['Calling Code', dataReady['calling']||'—'],
    ['Currency', dataReady['currency']||'—'],
    ['Postal Code', dataReady['postal']||'—'],
    ['Region', dataReady['region']||'—'],
    ['ISP', dataReady['isp']||'—'],
    ['Touch Input', dataReady['touch']||'—'],
    ['Pixel Ratio', dataReady['dpr']||'—'],
    ['Color Depth', dataReady['depth']||'—'],
    ['Memory', dataReady['mem']||'—'],
    ['CPU Cores', dataReady['cores']||'—'],
    ['Platform', dataReady['platform']||'—'],
    ['Language', dataReady['langs']||'—'],
    ['Battery', dataReady['bat']||'—'],
    ['Display', dataReady['disp']||'—'],
    ['Connection', dataReady['conn']||'—'],
    ['Device', dataReady['dev']||'—'],
    ['Timezone', dataReady['tz']||'—'],
    ['Location', dataReady['loc']||'—'],
    ['IP Address', dataReady['ip']||'—'],
  ];

  const total = rewindData.length;
  let idx = 0;

  const speedDisplay = [1.0,0.88,0.74,0.61,0.49,0.38,0.28,0.20,0.13,0.08,0.04,0.01,0.00];
  let sdIdx = 0;

  function addRewindRow() {
    if(idx >= total) {
      showOrphanedFinal();
      return;
    }

    const [key, val] = rewindData[idx];
    const progress = idx / total; // 0=start fast, 1=end slow

    // Font size: tiny at start (fast), grows to readable (slow)
    const fontSize = 0.3 + progress * 1.05;
    const keySize  = 0.26 + progress * 0.3;
    const op       = 0.25 + progress * 0.75;

    const line = document.createElement('div');
    line.style.display = 'flex';
    line.style.alignItems = 'baseline';
    line.style.gap = '16px';
    line.style.padding = '0 12vw';
    line.style.opacity = op;
    line.style.whiteSpace = 'nowrap';
    line.style.overflow = 'hidden';
    line.style.flexShrink = '0';

    const k = document.createElement('span');
    k.style.fontFamily = "'Space Grotesk', sans-serif";
    k.style.fontSize = keySize + 'rem';
    k.style.letterSpacing = '0.15em';
    k.style.color = 'var(--muted)';
    k.style.textTransform = 'uppercase';
    k.style.fontWeight = '500';
    k.style.minWidth = '100px';
    k.style.flexShrink = '0';
    k.textContent = key;

    const v = document.createElement('span');
    v.style.fontFamily = "'Space Mono', monospace";
    v.style.fontSize = fontSize + 'rem';
    v.style.color = 'var(--ink)';
    v.style.letterSpacing = '-0.01em';
    v.style.overflow = 'hidden';
    v.style.textOverflow = 'ellipsis';
    v.textContent = val;

    line.appendChild(k);
    line.appendChild(v);

    // PREPEND — new rows appear at TOP, pushing old ones down
    container.insertBefore(line, container.firstChild);

    // Remove excess from bottom to keep it tidy
    while(container.children.length > 24) {
      container.removeChild(container.lastChild);
    }

    idx++;

    // Terminal speed display
    const sdi = Math.floor(progress * speedDisplay.length);
    if(sdi > sdIdx) {
      sdIdx = sdi;
      termShowSpeed(speedDisplay[Math.min(sdi, speedDisplay.length-1)].toFixed(2)+'x');
    }

    // Progress bar rewinds
    const pct = Math.round(100 - progress * 55);
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressLabel').textContent = 'REVERSING';

    // Interval: fast at start (30ms), slow at end (900ms) — smooth cubic curve
    const t = progress;
    const interval = 30 + (t * t * t) * 870;
    setTimeout(addRewindRow, interval);
  }

  function showOrphanedFinal() {
    // Clear container, show ONE big red line
    container.innerHTML = '';
    wrap.style.justifyContent = 'center';
    wrap.style.alignItems = 'flex-start';
    wrap.style.paddingTop = '20vh';

    const line = document.createElement('div');
    line.style.display = 'flex';
    line.style.alignItems = 'baseline';
    line.style.gap = '20px';
    line.style.padding = '0 12vw';
    line.style.whiteSpace = 'nowrap';

    const k = document.createElement('span');
    k.style.fontFamily = "'Space Grotesk', sans-serif";
    k.style.fontSize = '0.8rem';
    k.style.letterSpacing = '0.2em';
    k.style.color = 'var(--red)';
    k.style.textTransform = 'uppercase';
    k.style.fontWeight = '500';
    k.style.flexShrink = '0';
    k.textContent = 'route_depth';

    const v = document.createElement('span');
    v.style.fontFamily = "'Space Mono', monospace";
    v.style.fontSize = '1.8rem';
    v.style.color = 'var(--red)';
    v.style.letterSpacing = '-0.01em';
    v.style.background = 'rgba(232,55,42,0.07)';
    v.style.padding = '4px 12px';
    v.style.borderLeft = '3px solid var(--red)';
    v.textContent = 'orphaned';

    line.appendChild(k);
    line.appendChild(v);
    container.appendChild(line);

    // Store refs for the fix animation
    orphanedLineEl = line;
    orphanedLineEl._valEl = v;
    orphanedLineEl._keyEl = k;

    termShowSpeed('0.00x');
    document.getElementById('progressLabel').textContent = 'HALTED';
    document.getElementById('progressFill').style.width = '45%';

    if(onDone) setTimeout(onDone, 500);
  }

  addRewindRow();
}

            const newVal='resolved';
            let i=0;
            const typeIv=setInterval(()=>{
              if(i<newVal.length){ valEl.textContent+=newVal[i]; i++; }
              else {
                clearInterval(typeIv);
                if(valEl){ valEl.style.color='var(--green)'; valEl.style.borderLeftColor='var(--green)'; valEl.style.background='rgba(0,200,83,0.08)'; }
                const keyEl=targetLine._keyEl||targetLine.querySelector('div:first-child');
                if(keyEl) keyEl.style.color='var(--green)';
                setTimeout(()=>{
                  animXY(hand,targetX,targetY,-180,targetY,700,'inout',()=>{
                    hand.style.opacity='0'; if(onDone) onDone();
                  });
                },600);
              }
            },90);
          }
        },55);
      },700);
    });
  },200);
}

// ── MAIN CONDUCTOR SEQUENCE ──
function startConductorSequence() {
  // 1. terminal bar
  showTermBar(()=>{
    setTimeout(()=>{
      // 2. hand drags box
      handDragBox(()=>{
        // 3. cursor appears immediately — short blink (1.5s not 5s)
        const box=document.getElementById('drawnBox');
        const t1=document.getElementById('twText1');
        const cursor1=document.createElement('span');
        cursor1.className='cursor';
        t1.appendChild(cursor1);

        // short blink — 1.5s
        setTimeout(()=>{
          // 4. type line 1
          typeBeforeCursor(cursor1,'I know why you are here.',82,()=>{
            // double enter — two blank lines before line 2
            cursor1.insertAdjacentHTML('beforebegin','<br><br>');
            cursor1.remove();

            // move cursor to line 2
            setTimeout(()=>{
              const t2=document.getElementById('twText2');
              const cursor2=document.createElement('span');
              cursor2.className='cursor';
              t2.appendChild(cursor2);

              setTimeout(()=>{
                typeBeforeCursor(cursor2,'Let me help you. You seem lost.',75,()=>{
                  cursor2.remove();

                  // 5. pause visual — darken + VHS fullscreen
                  setTimeout(()=>{
                    // type pause command in terminal
                    termType('session.pause()','execution halted — all processes frozen',70,()=>{
                      // full screen darken + VHS
                      document.getElementById('vhsOverlay').classList.add('active');
                      document.getElementById('scanPhase').classList.add('vhs');
                      scanPaused=true;

                      // hold the freeze visually for 2.5s
                      setTimeout(()=>{
                        // 6. type reverse command
                        termType('session.reverse()',null,70,()=>{
                          document.getElementById('progressLabel').textContent='REVERSING';

                          // vhs stays on during reverse, removed when orphaned line appears
                          doReverse(()=>{
                            // speed has wound down to 0 — show final halt
                            termShowSpeed('0.00x');

                            // 7. show orphaned line highlighted — hold for 2s
                            setTimeout(()=>{
                              if(orphanedLineEl){
                                orphanedLineEl.scrollIntoView({behavior:'smooth',block:'center'});
                                // remove vhs now that we've stopped on the line
                                document.getElementById('vhsOverlay').classList.remove('active');
                                document.getElementById('scanPhase').classList.remove('vhs');
                                // hold so user sees the red line clearly
                                setTimeout(()=>{
                                  termType('session.set(route_depth, "resolved")','patching entry point...',65,()=>{
                                    // 8. flipped hand fixes the line
                                    setTimeout(()=>{
                                      handFixLine(orphanedLineEl,()=>{
                                        // 9. progress turns green
                                        document.getElementById('progressFill').classList.add('green');
                                        document.getElementById('progressLabel').textContent='RESOLVED';

                                        // terminal confirms
                                        termType('session.resume()','route_depth resolved — access pathway open',65,()=>{
                                          // 10. type "try again." with double enter before
                                          setTimeout(()=>{
                                            const t2El=document.getElementById('twText2');
                                            const t3El=document.getElementById('twText3');
                                            // add double space before try again
                                            t2El.insertAdjacentHTML('afterend','');
                                            const cursor3=document.createElement('span');
                                            cursor3.className='cursor';
                                            // append cursor after a visual gap
                                            t3El.insertAdjacentHTML('beforeend','<br>');
                                            setTimeout(()=>{
                                              t3El.insertAdjacentHTML('beforeend','<br>');
                                              t3El.appendChild(cursor3);
                                              setTimeout(()=>{
                                                typeBeforeCursor(cursor3,'Try again',110,()=>{
                                                  // ellipsis one dot at a time
                                                  setTimeout(()=>{ cursor3.insertAdjacentText('beforebegin','.'); },400);
                                                  setTimeout(()=>{ cursor3.insertAdjacentText('beforebegin','.'); },900);
                                                  setTimeout(()=>{ cursor3.insertAdjacentText('beforebegin','.'); },1500);
                                                  setTimeout(()=>{
                                                    cursor3.remove();
                                                    setTimeout(triggerDissolve,1800);
                                                  },2400);
                                                });
                                              },500);
                                            },600);
                                          },1200);
                                        });
                                      });
                                    },800);
                                  });
                                },600);
                              } else {
                                setTimeout(triggerDissolve,2000);
                              }
                            },600);
                          });
                        });
                      },2500);
                    });
                  },800);
                });
              },400);
            },500);
          });
        },1500);
      });
    },800);
  });
}

// ── DISSOLVE ──
function triggerDissolve() {
  dissolveTriggered=true;
  // type terminate() in terminal then close it
  termType('terminate()','session closed',65,()=>{
    setTimeout(()=>{
      document.getElementById('termBar').classList.remove('visible');
    },600);
  });
  document.getElementById('progressLabel').textContent='COMPLETE';
  document.getElementById('scanPhase').classList.add('dissolving');
  setTimeout(()=>{
    document.getElementById('scanPhase').style.display='none';
    document.getElementById('loginPhase').classList.add('visible');
  },3000);
}

// ── LOGIN ──
document.addEventListener('keydown', e=>{ if(e.key==='Enter') attemptLogin(); });
function attemptLogin() {
  const user=document.getElementById('username').value.trim();
  const pass=document.getElementById('password').value.trim();
  if(!user){ showMsg('Employee ID is required.','error'); return; }
  if(pass.toLowerCase()===ACCESS_CODE){
    showMsg('Verified — establishing secure session...','success');
    document.getElementById('loginProgress').classList.add('show');
    setTimeout(()=>document.getElementById('loginBar').style.width='100%',50);
    setTimeout(()=>{
      const ov=document.getElementById('overlay'); ov.classList.add('show');
      setTimeout(()=>document.getElementById('ovFill').style.width='100%',100);
      setTimeout(()=>window.location.href=REDIRECT_URL,2500);
    },1600);
  } else {
    showMsg('Invalid credentials. This attempt has been logged.','error');
    document.getElementById('password').value='';
    document.getElementById('password').focus();
  }
}
function showMsg(text,type){ const m=document.getElementById('msg'); m.textContent=text; m.className=`msg show ${type}`; }

// ── KICK OFF ──
setTimeout(revealNextRow, 800);
setTimeout(()=>{ if(!typewriterTriggered){ typewriterTriggered=true; startConductorSequence(); } }, 30000);
</script>
