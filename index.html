<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAWSOME ONLINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" loop></audio>

    <div id="radioWidget">
        <div id="radioDragHandle"><div class="radio-drag-dots"></div></div>
        <div class="radio-inner">
            <div class="radio-marquee-wrap">
                <div class="radio-marquee" id="radioTitle">Track Name</div>
            </div>
            <div class="radio-artist" id="radioArtist">Artist</div>
            <div class="radio-progress-wrap">
                <div class="radio-progress-bar">
                    <div class="radio-progress-fill" id="radioFill"></div>
                </div>
                <div class="radio-times">
                    <span id="radioCurrent">0:00</span>
                    <span id="radioDuration">0:00</span>
                </div>
            </div>
            <div class="radio-controls">
                <button class="radio-btn" onclick="prevTrack()">&#9664;&#9664;</button>
                <button class="radio-btn radio-play" id="radioPlayBtn" onclick="pauseMusic()">&#9654;</button>
                <button class="radio-btn" onclick="nextTrack()">&#9654;&#9654;</button>
            </div>
            <div class="radio-volume-wrap">
                <span class="radio-vol-label">VOL</span>
                <input type="range" class="radio-volume" id="radioVolume" min="0" max="100" value="30" oninput="setVolume(this.value/100)">
            </div>
            <div class="radio-playlist-hint">Playlist manager — coming soon</div>
        </div>
    </div>

    <canvas id="dotCanvas"></canvas>
    <div class="haze"></div>
    <div class="vhs-overlay" id="vhsOverlay"></div>
    <div class="geo-top"></div>
    <div class="geo-left"></div>
    <div class="geo-corner"></div>

    <svg class="corner-accent corner-tl" viewBox="0 0 180 180" fill="none">
        <line x1="0" y1="120" x2="0" y2="40" /><line x1="0" y1="40" x2="80" y2="40" />
        <line x1="24" y1="80" x2="24" y2="16" /><line x1="24" y1="16" x2="100" y2="16" />
    </svg>
    <svg class="corner-accent corner-tr" viewBox="0 0 220 220" fill="none">
        <line x1="220" y1="0" x2="60" y2="160" /><line x1="220" y1="40" x2="100" y2="160" />
        <line x1="170" y1="0" x2="40" y2="130" /><line x1="190" y1="0" x2="220" y2="0" />
        <line x1="190" y1="0" x2="190" y2="50" />
    </svg>
    <svg class="corner-accent corner-bl" viewBox="0 0 160 160" fill="none">
        <line x1="0" y1="30" x2="0" y2="120" /><line x1="0" y1="120" x2="80" y2="120" />
        <line x1="26" y1="80" x2="26" y2="144" /><line x1="26" y1="144" x2="110" y2="144" />
    </svg>
    <svg class="corner-accent corner-br" viewBox="0 0 160 160" fill="none">
        <line x1="160" y1="30" x2="160" y2="120" /><line x1="80" y1="120" x2="160" y2="120" />
        <line x1="134" y1="80" x2="134" y2="144" /><line x1="50" y1="144" x2="134" y2="144" />
    </svg>

    <div class="scroll-line sl-1"></div>
    <div class="scroll-line sl-2"></div>
    <div class="scroll-line sl-3"></div>
    <div class="scroll-line sl-4"></div>
    <div class="scroll-line sl-5"></div>

    <div id="termBar">
        <span class="term-prompt">root@bsi-node-7 ~$</span>
        <span class="term-line" id="termLine"><span class="term-cursor"></span></span>
    </div>

    <img id="handImg" src="Images/hand.png" alt="" />
    <img id="handImgFlipped" src="Images/hand.png" alt="" />

    <svg id="anonCursor" viewBox="0 0 20 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0 L0 20 L5 15 L8 24 L11 23 L8 14 L14 14 Z" fill="#1a1a18" />
    </svg>

    <canvas id="globeCanvas"></canvas>
    <svg id="globeOverlay" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;overflow:visible;"></svg>

    <!-- ── SCAN PHASE ── -->
    <div id="scanPhase" style="display: none;">
        <div class="scan-header">
            <div class="scan-wordmark">BAWSOME ONLINE<span class="red-dot"></span></div>
            <div class="scan-tagline">Initializing Secure Session</div>
        </div>
        <div class="scan-left">
            <div class="scan-lines-wrap" id="scanLinesWrap">
                <div class="scan-lines" id="scanLines"></div>
            </div>
            <div class="scan-progress">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-meta">
                    <span id="progressLabel">Collecting data</span>
                    <span id="progressPct">0%</span>
                </div>
            </div>
        </div>
        <div class="scan-right" id="scanRight">
            <div id="drawnBox">
                <div class="drawn-box-inner">
                    <div class="tw-text" id="twText1"></div>
                    <div class="tw-text2" id="twText2"></div>
                    <div class="tw-text3" id="twText3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── HONEYCOMB CANVAS ──
         Fullscreen canvas. Drawn on first visit before the login card.
         On returning visits this layer is skipped entirely.
         The canvas stays in the DOM but is hidden after the sequence. -->
    <canvas id="hexCanvas"></canvas>

    <!-- ── SECURED FLASH ──
         Appears after honeycombs settle. Flickers in with ripple
         rectangles expanding outward, then flickers out. -->
    <div id="securedFlash">
        <div id="securedWord">SECURED</div>
        <svg id="securedRipples" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;"></svg>
    </div>

    <!-- ── HEX CITY CANVAS ──
         3D perspective fly-through running behind the login. -->
    <canvas id="cityCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:18;display:none;"></canvas>

    <!-- ── LOGIN PHASE ──
         No card. Just the input floating over the city.
         Enter key submits. -->
    <div id="loginPhase">

        <div class="lp-hud-tl">
            <span class="lp-hud-dot"></span>BSI-NODE-7
        </div>

        <div class="lp-hud-br">
            <span id="sessionId">BSI-——</span>
        </div>

        <div class="lp-center">
            <div class="lp-label">PASSPHRASE</div>
            <div class="lp-input-wrap">
                <input
                    type="password"
                    id="password"
                    class="lp-input"
                    placeholder="—"
                    autocomplete="off"
                    spellcheck="false"
                />
            </div>
            <div class="lp-hint">ENTER TO AUTHENTICATE</div>
            <div class="msg" id="msg"></div>
            <div class="progress-wrap" id="loginProgress">
                <div class="progress-bar" id="loginBar"></div>
            </div>
        </div>

    </div>

    <div id="overlay">
        <div class="ov-title">Access <span>Granted.</span></div>
        <div class="ov-sub">Loading classified archive</div>
        <div class="ov-bar"><div class="ov-fill" id="ovFill"></div></div>
    </div>

    <!-- ── ARG REGISTRATION PROMPT ──
         New visitors only. Appears after the dissolve sequence.
         Extremely minimal — just an input and a submit. -->
    <div id="argRegPrompt">
        <div class="arg-minimal-inner">
            <input
                type="text"
                id="argUsername"
                class="arg-minimal-input"
                placeholder="—"
                autocomplete="off"
                spellcheck="false"
                maxlength="32"
            />
            <button class="arg-minimal-btn" id="argRegBtn" onclick="argRegister()">
                <span id="argRegBtnText">→</span>
            </button>
            <div class="arg-minimal-msg" id="argRegMsg"></div>
            <div class="arg-minimal-sub" id="argRegSub">designate</div>
        </div>
    </div>

    <!-- ── CARD PROMPT ──
         Returning visitors. Just a drop zone — no text, no labels.
         The action speaks for itself. -->
    <div id="argCardPrompt">
        <div class="arg-minimal-inner">
            <div class="arg-card-slot" onclick="document.getElementById('argCardFile').click()">
                <div class="arg-card-slot-line"></div>
                <div class="arg-card-slot-line"></div>
            </div>
            <input type="file" id="argCardFile" accept="image/*"
                   style="display:none" onchange="argUploadCard(this)">
            <div class="arg-minimal-msg" id="argCardMsg"></div>
            <button class="arg-minimal-ghost" onclick="argSwitchToRegister()">—</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
